<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/pokemon-explorer/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokédex Explorer</title>
    <script>
      // Applied before React mounts so the page never flashes the wrong theme.
      (function () {
        var stored = localStorage.getItem('pokemon-explorer:theme');
        var isDark = stored ? stored === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.classList.toggle('dark', isDark);
      })();
    </script>
    <script type="module" crossorigin src="/pokemon-explorer/assets/index-DmuFgYp2.js"></script>
    <link rel="stylesheet" crossorigin href="/pokemon-explorer/assets/index-CTn19iC8.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
